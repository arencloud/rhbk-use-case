apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: balance-gateway-tls
  namespace: balance
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    app.kubernetes.io/name: balance
    app.kubernetes.io/component: gateway-tls
spec:
  secretName: balance-gateway-tls
  duration: 2160h
  renewBefore: 360h
  commonName: balance.arencloud.com
  dnsNames:
    - balance.arencloud.com
  privateKey:
    algorithm: RSA
    size: 2048
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: vault
