apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: balance
  namespace: balance
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  labels:
    app.kubernetes.io/name: balance
    app.kubernetes.io/component: gateway
spec:
  gatewayClassName: istio
  listeners:
    - name: https
      hostname: balance.arencloud.com
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: balance-gateway-tls
      allowedRoutes:
        namespaces:
          from: Same
