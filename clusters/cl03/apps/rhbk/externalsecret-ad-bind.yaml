apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rhbk-ad-bind-vault
  namespace: rhbk
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    app.kubernetes.io/name: rhbk
    app.kubernetes.io/component: ad-federation
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: rhbk-ad-bind-vault
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: arencloud_ldapBc
      remoteRef:
        key: cl03/rhbk/ad-bind
        property: bindCredential
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
