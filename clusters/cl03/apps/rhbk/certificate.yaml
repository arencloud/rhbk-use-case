apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: rhbk-gateway-tls
  namespace: rhbk
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    app.kubernetes.io/name: rhbk
    app.kubernetes.io/component: gateway-tls
spec:
  secretName: rhbk-gateway-tls
  duration: 2160h
  renewBefore: 360h
  commonName: sso.arencloud.com
  dnsNames:
    - sso.arencloud.com
  privateKey:
    algorithm: RSA
    size: 2048
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: vault
