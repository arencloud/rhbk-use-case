apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rhbk-operator
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: cluster-wide
  source:
    repoURL: https://github.com/arencloud/rhbk-use-case.git
    targetRevision: HEAD
    path: clusters/cl03/operators/rhbk
  destination:
    server: https://kubernetes.default.svc
    namespace: rhbk
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
