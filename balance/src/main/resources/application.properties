quarkus.application.name=balance
quarkus.http.port=8080

quarkus.oidc.auth-server-url=${OIDC_AUTH_SERVER_URL:https://sso.arencloud.com/realms/arencloud}
quarkus.oidc.client-id=${OIDC_CLIENT_ID:balance}
quarkus.oidc.credentials.secret=${OIDC_CLIENT_SECRET:change-me}
quarkus.oidc.application-type=hybrid
quarkus.oidc.authentication.redirect-path=/authorization-code/callback
quarkus.oidc.authentication.restore-path-after-redirect=true

quarkus.http.auth.permission.public.paths=/styles/*,/q/*,/favicon.ico
quarkus.http.auth.permission.public.policy=permit
quarkus.http.auth.permission.authenticated.paths=/*
quarkus.http.auth.permission.authenticated.policy=authenticated

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:balance}
quarkus.datasource.password=${DB_PASSWORD:balance}
quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:postgresql://localhost:5432/balance}
quarkus.hibernate-orm.schema-management.strategy=update
quarkus.hibernate-orm.log.sql=false

quarkus.smallrye-openapi.info-title=Balance API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Bank balance use-case API secured by RHBK roles.

%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.username=sa
%dev.quarkus.datasource.password=sa
%dev.quarkus.datasource.jdbc.url=jdbc:h2:mem:balance;DB_CLOSE_DELAY=-1
%dev.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%dev.quarkus.devservices.enabled=false
%dev.quarkus.oidc.enabled=false
%dev.quarkus.http.auth.basic=true
%dev.quarkus.security.users.embedded.enabled=true
%dev.quarkus.security.users.embedded.plain-text=true
%dev.quarkus.security.users.embedded.users.employee=employee
%dev.quarkus.security.users.embedded.users.approver=approver
%dev.quarkus.security.users.embedded.users.auditor=auditor
%dev.quarkus.security.users.embedded.users.admin=admin
%dev.quarkus.security.users.embedded.roles.employee=balance_user
%dev.quarkus.security.users.embedded.roles.approver=balance_user,balance_approver
%dev.quarkus.security.users.embedded.roles.auditor=balance_auditor
%dev.quarkus.security.users.embedded.roles.admin=balance_admin

%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=sa
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:balance-test;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%test.quarkus.oidc.enabled=false
